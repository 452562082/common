# golangci-lint v2 configuration. See https://golangci-lint.run/usage/configuration/
version: "2"

run:
  timeout: 5m

linters:
  default: none
  enable:
    - errcheck
    - govet
    - ineffassign
    - staticcheck
    - unused
    - misspell
    - revive
    - bodyclose

  settings:
    errcheck:
      # These are "fire and forget" call sites where Go idioms accept the
      # discarded return value. Listing them here is cleaner than scattering
      # `_ =` prefixes everywhere.
      exclude-functions:
        - (io.Closer).Close
        - (net/http.ResponseWriter).Write
        - fmt.Fprint
        - fmt.Fprintf
        - fmt.Fprintln

    revive:
      rules:
        - name: var-naming
          disabled: false
        - name: exported
          # Too noisy until every public symbol has full Go-doc — flip on
          # later as part of a doc audit.
          disabled: true

  exclusions:
    rules:
      - path: _test\.go
        linters:
          - errcheck
          - gosec
      # `utils` is a deliberately generic name for the buffer-pool /
      # unsafe-string helpers; revive's "meaningless package name" check
      # is too strict here.
      - path: ^utils/
        linters:
          - revive
