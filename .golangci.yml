# golangci-lint v2 configuration. See https://golangci-lint.run/usage/configuration/
version: "2"

run:
  timeout: 5m

linters:
  default: none
  enable:
    - errcheck
    - govet
    - ineffassign
    - staticcheck
    - unused
    - misspell
    - revive
    - bodyclose

  settings:
    revive:
      rules:
        - name: var-naming
          disabled: false
        - name: exported
          # Too noisy until every public symbol has full Go-doc — flip on
          # later as part of a doc audit.
          disabled: true

  exclusions:
    rules:
      - path: _test\.go
        linters:
          - errcheck
          - gosec
