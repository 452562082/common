run:
  timeout: 5m
  tests: true

linters:
  disable-all: true
  enable:
    - errcheck
    - gosimple
    - govet
    - ineffassign
    - staticcheck
    - unused
    - gofmt
    - goimports
    - misspell
    - revive
    - bodyclose

linters-settings:
  revive:
    rules:
      - name: var-naming
        disabled: false
      - name: exported
        disabled: true # too noisy for now; re-enable once docstrings are added

issues:
  exclude-rules:
    - path: _test\.go
      linters:
        - errcheck
        - gosec
