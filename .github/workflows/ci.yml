name: CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # go.mod declares `go 1.25`. We only test against that one version —
        # we use features that require it (math/rand/v2 + range-over-int +
        # maps.Copy etc). Lowering the matrix lets us drop GOTOOLCHAIN
        # gymnastics for older runners.
        go: ['1.25']
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go ${{ matrix.go }}
        uses: actions/setup-go@v6
        with:
          go-version: ${{ matrix.go }}
          cache: true

      - name: Verify modules
        run: |
          go mod tidy
          git diff --exit-code go.mod go.sum

      - name: Build
        run: go build ./...

      - name: Vet
        run: go vet ./...

      - name: Test
        run: go test -race -count=1 -coverprofile=coverage.txt -covermode=atomic ./...

      - name: Upload coverage
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: coverage.txt

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v6
        with:
          go-version: '1.25'
          cache: true
      # golangci-lint v2.x is the first major series compiled with Go 1.24+,
      # so it can lint a project whose go.mod targets go 1.25. v1.x cannot.
      - uses: golangci/golangci-lint-action@v8
        with:
          version: v2.5.0

  vuln:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v6
        with:
          go-version: '1.25'
          cache: true
      - name: Install govulncheck
        run: go install golang.org/x/vuln/cmd/govulncheck@latest
      - name: Scan
        run: govulncheck ./...
